<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>نواة — Check In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #EBEBEB;
      --surface:  #F7F7F7;
      --border:   #D4D4D4;
      --text:     #1A1A1A;
      --muted:    #7A7A7A;
      --accent:   #1A1A1A;
      --green:    #2E6E4E;
      --green-bg: #E6F2EC;
      --red:      #B03030;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 16px 40px;
    }

    /* TOP BAR */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
    }
    .rq-logo {
      height: 32px;
      width: auto;
      filter: invert(1);
    }
    .topbar-right {
      text-align: right;
      line-height: 1.4;
    }
    .topbar-right .en {
      font-size: 11px;
      font-weight: 500;
      color: #CCCCCC;
      letter-spacing: 0.04em;
      display: block;
    }
    .topbar-right .ar {
      font-size: 11px;
      color: #888888;
      display: block;
    }

    /* CARD */
    .card {
      background: var(--surface);
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 28px rgba(0,0,0,0.08);
      padding: 40px 36px 36px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      animation: rise 0.4s ease;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* NAWAH LOGO */
    .nawah-logo-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 8px;
    }
    .nawah-logo {
      width: 160px;
      height: auto;
      filter: none;
    }
    .nawah-sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 0 24px;
    }

    .session-tag {
      background: #E4E4E4;
      color: var(--accent);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      display: inline-block;
      margin-bottom: 24px;
    }
    .form-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
      display: block;
      text-align: left;
    }
    input[type="text"] {
      width: 100%;
      padding: 14px 18px;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      background: #FFF;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 12px;
      text-align: center;
    }
    input[type="text"]:focus { border-color: #888; }
    input[type="text"]::placeholder { color: #BBBBBB; }

    button {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: #F7F7F7;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.1s;
    }
    button:hover  { background: #333; }
    button:active { transform: scale(0.99); }
    button:disabled { background: #BBBBBB; cursor: not-allowed; }

    .error-msg {
      color: var(--red);
      font-size: 13px;
      margin-top: -4px;
      margin-bottom: 10px;
      display: none;
      text-align: left;
    }

    /* SUCCESS */
    .success { display: none; animation: rise 0.4s ease; }
    .success-mark {
      width: 54px; height: 54px;
      background: var(--green-bg);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      margin: 0 auto 18px;
      color: var(--green);
      font-weight: 600;
    }
    .success h2 { font-size: 20px; font-weight: 600; color: var(--green); margin-bottom: 6px; }
    .success .name-display { font-size: 17px; font-weight: 500; color: var(--text); margin-bottom: 12px; }
    .success .timestamp {
      background: var(--green-bg); color: var(--green);
      border-radius: 8px; padding: 10px 16px;
      font-size: 12px; font-weight: 500;
      display: inline-block; margin-bottom: 18px;
    }
    .success .note { color: var(--muted); font-size: 13px; }

    /* EXPIRED */
    .expired-msg {
      background: #FBF0EE; color: var(--red);
      border-radius: 10px; padding: 18px;
      font-size: 14px; font-weight: 500;
    }
  </style>
</head>

<script>
  const params = new URLSearchParams(window.location.search);
  const sid = params.get('sid');

  async function loadSession() {
    try {
      const res  = await fetch('/session/status');
      const data = await res.json();
      if (data.active) {
        document.getElementById('session-tag').textContent = data.session.name;
      } else {
        showExpired('No active session. Please wait for your trainer to start the session.');
      }
    } catch(e) {
      document.getElementById('session-tag').textContent = 'Session';
    }
  }

  async function submitAttendance() {
    const input  = document.getElementById('name-input');
    const btn    = document.getElementById('submit-btn');
    const errMsg = document.getElementById('error-msg');
    const name   = input.value.trim();
    if (!name) { errMsg.style.display = 'block'; input.focus(); return; }
    errMsg.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
      const res  = await fetch('/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, sid })
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('form-section').style.display = 'none';
        const s = document.getElementById('success-section');
        s.style.display = 'block';
        document.getElementById('success-name').textContent = data.name;
        document.getElementById('success-time').textContent = data.session + '  ·  ' + data.date + '  ·  ' + data.time;
      } else {
        showExpired(data.error || 'Something went wrong.');
      }
    } catch(e) {
      btn.disabled = false;
      btn.textContent = 'Check In →';
      alert('Could not connect. Please try again.');
    }
  }

  document.getElementById('name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitAttendance();
  });
  loadSession();
</script>
