<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>نواة — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #EDEDED;
      --surface:  #F7F7F7;
      --border:   #D4D4D4;
      --text:     #1A1A1A;
      --muted:    #7A7A7A;
      --accent:   #2A2A2A;
      --green:    #2E6E4E;
      --green-bg: #E6F2EC;
      --red:      #B03030;
      --red-bg:   #FBF0EE;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px 40px;
    }

    /* ── TOP BAR ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .rq-logo-mark { width: 28px; height: 28px; }
    .topbar-right { text-align: right; line-height: 1.3; }
    .topbar-right .en { font-size: 11px; font-weight: 500; color: #CCCCCC; letter-spacing: 0.04em; }
    .topbar-right .ar { font-size: 11px; color: #888888; }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 24px rgba(0,0,0,0.07);
      padding: 48px 40px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .nawah-logo { width: 120px; height: auto; object-fit: contain; margin-bottom: 8px; mix-blend-mode: multiply; filter: grayscale(100%) contrast(1.2); }
    .nawah-wordmark {
      font-size: 38px;
      font-weight: 300;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .nawah-sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .admin-eyebrow {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.10em;
      text-transform: uppercase;
      margin-bottom: 36px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
      margin-top: 14px;
    }

    /* ── START SESSION ── */
    .session-input-row { display: flex; gap: 10px; }
    input[type="text"] {
      flex: 1;
      padding: 13px 16px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      background: #FFF;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #888; }
    input[type="text"]::placeholder { color: #BBBBBB; }

    .btn {
      padding: 13px 22px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-dark  { background: var(--accent); color: #F7F7F7; }
    .btn-dark:hover { background: #444; }
    .btn-red   { background: var(--red-bg); color: var(--red); width: 100%; margin-top: 20px; border: 1px solid #E8C4C0; }
    .btn-red:hover { background: #F5E0DC; }

    /* ── ACTIVE SESSION ── */
    #active-session { display: none; }
    .session-badge {
      background: var(--green-bg);
      color: var(--green);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      display: inline-block;
      margin-bottom: 28px;
    }
    .qr-wrapper {
      background: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      display: inline-block;
      margin-bottom: 20px;
    }
    #qr-img { width: 200px; height: 200px; border-radius: 4px; display: block; }
    .url-box {
      background: #EFEFEF;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--muted);
      word-break: break-all;
      margin-bottom: 8px;
      text-align: left;
    }
    .hint { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 22px 0; }
  </style>
</head>

  <div class="topbar-left">
    <svg class="rq-logo-mark" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="24" height="24" rx="4" stroke="#CCCCCC" stroke-width="1.5"/>
      <rect x="8" y="8" width="12" height="12" rx="2" fill="#CCCCCC"/>
    </svg>
  </div>
  <div class="topbar-right">
    <div class="en">RQ Science &amp; Technology</div>
    <div class="ar">ربع قرن للعلوم والتكنولوجيا</div>
  </div>
</header>

  <div class="nawah-sub">Nawah Program</div>
  <div class="admin-eyebrow">Admin Panel</div>

  <div id="no-session">
    <div class="session-input-row">
      <input type="text" id="session-name" placeholder="Session name (e.g. Morning Workshop)"/>
      <button class="btn btn-dark" onclick="startSession()">Start</button>
    </div>
  </div>

  <div id="active-session">
    <div class="session-badge" id="session-badge">● Session Active</div>
    <div class="qr-wrapper"><img id="qr-img" src="" alt="QR Code"/></div>
    <div class="url-box" id="url-box"></div>
    <p class="hint">Students scan this QR to check in. Starting a new session invalidates the old QR.</p>
    <hr class="divider"/>
    <button class="btn btn-red" onclick="endSession()">End Session</button>
  </div>
</div>

<script>
  async function startSession() {
    const name = document.getElementById('session-name').value.trim()
      || `Session ${new Date().toLocaleDateString('en-GB')}`;
    const res  = await fetch('/session/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name })
    });
    const data = await res.json();
    if (data.success) loadStatus();
  }
  async function endSession() {
    if (!confirm('End this session? The QR code will stop working immediately.')) return;
    await fetch('/session/end', { method: 'POST' });
    document.getElementById('no-session').style.display   = 'block';
    document.getElementById('active-session').style.display = 'none';
    document.getElementById('session-name').value = '';
  }
  async function loadStatus() {
    const res  = await fetch('/session/status');
    const data = await res.json();
    if (data.active) {
      document.getElementById('no-session').style.display     = 'none';
      document.getElementById('active-session').style.display = 'block';
      document.getElementById('qr-img').src          = data.qr;
      document.getElementById('url-box').textContent  = data.url;
      document.getElementById('session-badge').textContent = `● ${data.session.name}`;
    } else {
      document.getElementById('no-session').style.display     = 'block';
      document.getElementById('active-session').style.display = 'none';
    }
  }
  loadStatus();
</script>
</body>
</html>
